model:
  latent_dim: 128
  generator_dim: [256, 256]
  discriminator_dim: [256, 256]
  pac: 2

training:
  batch_size: 500
  epochs: 300
  lr_g: 0.0002
  lr_d: 0.0002
  beta1: 0.5
  beta2: 0.9
  n_critic: 5
  lambda_gp: 10
  seed: 42

data:
  dataset: "creditcard"
  target_col: "Class"
  test_size: 0.2

logging:
  wandb_project: "analyticgan"
  save_every: 10
  checkpoint_dir: "checkpoints/"
